  _BASE_CONFIG_ : ./configs/base/levir.yml
  mode : test
  device : Ascend
  type : BinaryChangeDetectionFramework
  model_name: FCNPP
  logfilepath: logs/fcnpp_levir/fcnpp_levir.log
  train:
    epochs : 100
    batch_size : 1
    snapshots_dir : ./checkpoints/FCNPP/
    save_intervals : 5
  eval :
    batch_size : 1
  test:
    batch_size : 1
    checkpoint : checkpoints/FCNPP/20.pth
    save_path : ./results/FCNPP/levir-cd/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: FCNPPEncoder
      in_channels: 3
      DC_out: 32
      mlp: [[32,64],[64,128],[128,256],[256,256]]
    decode_head : 
      type: FCNPPDecoder
      bilinear: True
      up: [32,64,128,256,512]
    feature_interaction: 
    prediction_head:
      type: FCNHead
      in_channels: 32
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.001
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        momentum: 0.9
        weight_decay: 0.0005

  
      
        