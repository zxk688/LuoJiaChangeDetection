  _BASE_CONFIG_ : ./configs/base/s2looking.yml
  mode : train
  device : cuda:0
  type : BinaryChangeDetectionFramework
  model_name: BiSRNet
  logfilepath: logs/bisrnet_s2looking/bisrnet_s2looking.log
  train:
    epochs : 100
    batch_size : 10
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/BiSRNet/20.pth
    save_path : ./results/BiSRNet/landslide/
  model:
    CONNECTED: True
    CONNECTED_Temporal: T1T2
    type: CDEncoderDecoder
    backbone : 
      type: SemanticReasoningEncoder
    decode_head : 
      type: BiSRNetDecoder
    feature_interaction: 
      type: normal 
      policy: concat
      out_indices: [0,1]
    prediction_head:
  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        