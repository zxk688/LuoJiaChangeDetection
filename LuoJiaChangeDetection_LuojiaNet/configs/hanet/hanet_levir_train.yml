  _BASE_CONFIG_ : ./configs/base/levir.yml
  mode : train
  device : CPU
  type : BinaryChangeDetectionFramework
  model_name: HANet
  logfilepath: logs/hanet_levir/hanet_levir.log
  train:
    epochs : 100
    batch_size : 4
    snapshots_dir : ./checkpoints/HANet/
    save_intervals : 5
  eval :
    batch_size : 4
  test:
    batch_size : 4
    checkpoint : checkpoints/HANet/HANet_best.ckpt
    save_path : ./results/HANet/levir-cd/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: CNNEncoder
      in_channels: 3
      base_channel: 40
    decode_head : 
      type: HANetDecoder
      base_channel: 40
    feature_interaction: 
    prediction_head:
      type: FCNHead
      in_channels: 80
      output_channels: 1
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.001
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        momentum: 0.9
        weight_decay: 0.0005

      
        