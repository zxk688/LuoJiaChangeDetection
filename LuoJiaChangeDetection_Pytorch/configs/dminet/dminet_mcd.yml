  _BASE_CONFIG_ : ./configs/base/mcd.yml
  mode : test
  device : cuda:1
  type : BinaryChangeDetectionFramework
  model_name: DMINet
  logfilepath: logs/dminet_mcd/dminet_mcd.log
  train:
    epochs : 100
    batch_size : 36
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
  test:
    batch_size : 36
    checkpoint : ./checkpoints/DMINet/100.pth
    save_path : ./results/DMINet/mcd/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: ResnetMultilevelEncoder
    decode_head : 
      type: DMINetDecoder
    feature_interaction: 
    prediction_head:
      type: FCNHead
      in_channels: 64
      output_channels: 1
  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        