  _BASE_CONFIG_ : ./configs/base/x2view.yml
  mode : train
  device : cuda
  type : MulticlassChangeDetectionFramework
  model_name: DMINet
  logfilepath: logs/dminet_x2view/dminet_x2view.log
  train:
    epochs : 100
    batch_size : 1
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 1
  test:
    batch_size : 1
  model:
    
    type: CDEncoderDecoder
    output_channels: 5
    CONNECTED: False

    backbone : 
      type: ResnetMultilevelEncoder
    decode_head : 
      type: DMINetDecoder
    feature_interaction: 
    prediction_head:
      type: FCNHead
      in_channels: 64
      output_channels: 5
  losses: 
          loss_cls: 
              type: CrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        