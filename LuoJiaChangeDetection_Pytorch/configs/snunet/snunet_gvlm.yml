  _BASE_CONFIG_ : ./configs/base/gvlm.yml
  mode : train
  device : cuda:0
  type : BinaryChangeDetectionFramework
  model_name: SNUNet
  logfilepath: logs/snunet_gvlm/snunet_gvlm.log
  train:
    epochs : 100
    batch_size : 10
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/SNUNet/20.pth
    save_path : ./results/SNUNet/landslide/
  model:
    CONNECTED: True
    CONNECTED_Temporal: T2
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: NestedCNNEncoder
      in_channels: 3 
      filters: [32, 64, 128, 256, 512]
    decode_head : 
      type: SNUNetDecoder
      filters: [32, 64, 128, 256, 512]
    feature_interaction: 
      type: normal
      policy: concat
      out_indices: [0,1,2,3,4]
    prediction_head:
      type: FCNHead
      in_channels : 128
      output_channels: 1
  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        