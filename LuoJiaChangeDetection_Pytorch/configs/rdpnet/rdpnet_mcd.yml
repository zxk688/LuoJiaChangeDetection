  _BASE_CONFIG_ : ./configs/base/mcd.yml
  mode : test
  device : cuda:0
  type : BinaryChangeDetectionFramework
  model_name: RDPNet
  logfilepath: logs/rdpnet_mcd/rdpnet_mcd.log
  train:
    epochs : 100
    batch_size : 36
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
  test:
    batch_size : 24
    checkpoint : checkpoints/RDPNet/100.pth
    save_path : ./results/RDPNet/landslide/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: ConvMixerEncoder
      in_channels: 3
      hid_channels: 384
    decode_head : 
      type: RDPNetDecoder
      out_ch: 1 
      hid_ch: 384
      depth: 32
    feature_interaction: 
    prediction_head:

  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        