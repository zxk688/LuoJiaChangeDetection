  _BASE_CONFIG_ : ./configs/base/gvlm.yml
  mode : test
  device : cuda:0
  type : BinaryChangeDetectionFramework
  model_name: RDPNet
  logfilepath: logs/rdpnet_gvlm/rdpnet_gvlm.log
  train:
    epochs : 100
    batch_size : 10
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/RDPNet/10.pth
    save_path : ./results/RDPNet/landslide/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: ConvMixerEncoder
      in_channels: 3
      hid_channels: 384
    decode_head : 
      type: RDPNetDecoder
      out_ch: 1 
      hid_ch: 384
      depth: 32
    feature_interaction: 
    prediction_head:

  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        