  _BASE_CONFIG_ : ./configs/base/gvlm.yml
  mode : train
  device : cuda:0
  type : BinaryChangeDetectionFramework
  model_name: FC_Siam_conc
  logfilepath: logs/fc_siamconc_gvlm/fc_siamconc_gvlm.log
  train:
    epochs : 100
    batch_size : 10
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/FC_Siam_conc/60.pth
    save_path : ./results/FC_Siam_conc/landslide/
  model:
    CONNECTED: True
    CONNECTED_Temporal: T1T2
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: FCSiamEncoder
      in_channels: 3
      base_channel: 16
    decode_head : 
      type: FCSiamDecoder
      base_channel: 16
      mode : concat
    feature_interaction: 
      type: normal
      policy: concat
      out_indices: [0,1,2,3,4]
    prediction_head:
  losses: 
          loss_cls: 
              type: BinaryCrossEntropyLoss
  scheduler: 
          type : ReduceLROnPlateau
          optimizer:  
                type: Adam
                lr: 0.001
                filter_params: True
                params_rules: {}

  
      
        