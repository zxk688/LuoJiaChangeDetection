  _BASE_CONFIG_ : ./configs/base/hrscd.yml
  mode : train
  device : GPU
  type : BinaryChangeDetectionFramework
  model_name: FC_Siam_diff
  logfilepath: logs/fc_siamdiff_gvlm/fc_siamdiff_gvlm.log
  train:
    epochs : 100
    batch_size : 10
    snapshots_dir : ./checkpoints/
    save_intervals : 10
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/FC_Siam_diff/30.pth
    save_path : ./results/FC_Siam_diff/landslide/
  model:
    CONNECTED: True
    CONNECTED_Temporal: T1T2
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: FCSiamEncoder
      in_channels: 3
      base_channel: 16
    decode_head : 
      type: FCSiamDecoder
      base_channel: 16
      mode : diff
    feature_interaction: 
      type: normal
      policy: diff
      out_indices: [0,1,2,3,4]
    prediction_head:
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
          type : PolynomialDecayLR
          optimizer:  
                type: Adam
                lr: 0.001
                momentum: 0.9
                weight_decay: 0.0005
                filter_params: False
                params_rules: {}

  
      
        