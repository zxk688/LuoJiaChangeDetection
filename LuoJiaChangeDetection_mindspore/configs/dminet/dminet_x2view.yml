  _BASE_CONFIG_ : ./configs/base/x2view.yml
  mode : train
  device : Ascend
  type : MulticlassChangeDetectionFramework
  model_name: DMINet
  logfilepath: logs/dminet_x2view/dminet_x2view.log
  train:
    epochs : 100
    batch_size : 1
    snapshots_dir : ./checkpoints/DMINet/
    save_intervals : 10
  eval :
    batch_size : 1
  test:
    batch_size : 1
  model:
    type: CDEncoderDecoder
    output_channels: 5
    CONNECTED: False
    backbone : 
      type: ResnetMultilevelEncoder
    decode_head : 
      type: DMINetDecoder
    feature_interaction: 
    prediction_head:
      type: FCNHead
      in_channels: 64
      output_channels: 5
  losses: 
          loss_cls: 
              type: CrossEntropyLoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.001
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        momentum: 0.9
        weight_decay: 0.0005

  
      
        