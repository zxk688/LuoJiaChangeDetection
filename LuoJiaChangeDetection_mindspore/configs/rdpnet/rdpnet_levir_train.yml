  _BASE_CONFIG_ : ./configs/base/levir.yml
  mode : train
  device : GPU
  type : BinaryChangeDetectionFramework
  model_name: RDPNet
  logfilepath: logs/rdpnet_levir/rdpnet_levir.log
  train:
    epochs : 5
    batch_size : 2
    snapshots_dir : ./checkpoints/RDPNet/
    save_intervals : 5
  eval :
    batch_size : 4
  test:
    batch_size : 4
    checkpoint : checkpoints/RDPNet/10.pth
    save_path : ./results/RDPNet/levir-cd/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: ConvMixerEncoder
      in_ch: 3
      hid_ch: 384
    decode_head : 
      type: RDPNetDecoder
      out_ch: 1 
      hid_ch: 384
      depth: 32
    feature_interaction: 
    prediction_head:
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.001
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        weight_decay: 0.0005

        
  
      
        