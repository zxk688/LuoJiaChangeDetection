  _BASE_CONFIG_ : ./configs/base/gvlm.yml
  mode : train
  device : CPU
  type : BinaryChangeDetectionFramework
  model_name: USSFCNet
  logfilepath: logs/ussfcnet_gvlm/ussfcnet_gvlm.log
  train:
    epochs : 100
    batch_size : 4
    snapshots_dir : ./checkpoints/USSFCNet/
    save_intervals : 5
  eval :
    batch_size : 4
  test:
    batch_size : 4
    checkpoint : checkpoints/USSFCNet/10.pth
    save_path : ./results/USSFCNet/landslide/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: CNNAttentionEncoder
      in_ch: 3 
      ratio: 0.5
      mlp: [64,128,256,512,1024]
    decode_head : 
      type: CNNAttentionDecoder
      out_ch: 1
      ratio: 0.5
      mlp: [64,128,256,512,1024]
    feature_interaction: 
      type: normal
      policy: sum
      out_indices: [0,1,2,3,4]
    prediction_head:
      type: FCNHead
      in_channels: 32
      output_channels: 1
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.01
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        momentum: 0.9
        weight_decay: 0.0005

  
      
        