  _BASE_CONFIG_ : ./configs/base/levir.yml
  mode : train
  device : GPU
  type : BinaryChangeDetectionFramework
  model_name: USSFCNet
  logfilepath: logs/ussfcnet_levir/ussfcnet_levir.log
  train:
    epochs : 5
    batch_size : 2
    snapshots_dir : ./checkpoints/USSFCNet/
    save_intervals : 5
  eval :
    batch_size : 10
  test:
    batch_size : 10
    checkpoint : checkpoints/USSFCNet/USSFCNet_best.ckpt
    save_path : ./results/USSFCNet/levir-cd/
  model:
    CONNECTED: False
    type: CDEncoderDecoder
    output_channels: 1
    backbone : 
      type: CNNAttentionEncoder
      in_ch: 3 
      ratio: 0.5
      mlp: [64,128,256,512,1024]
    decode_head : 
      type: CNNAttentionDecoder
      out_ch: 1
      ratio: 0.5
      mlp: [64,128,256,512,1024]
    feature_interaction: 
      type: normal
      policy: sum
      out_indices: [0,1,2,3,4]
    prediction_head:
      type: FCNHead
      in_channels: 1
      output_channels: 1
  losses: 
          loss_cls: 
              type: BCELoss
  scheduler: 
        type : PolynomialDecayLR
        learning_rate: 0.001
        end_learning_rate: 0.0005
        decay_steps: 4
        power: 0.5
  optimizer:  
        type: Adam
        weight_decay: 0.0005

  
      
        